name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ChatWithEveryone.xcodeproj \
            -scheme ChatWithEveryone

      - name: Build Release Archive
        run: |
          xcodebuild -project ChatWithEveryone.xcodeproj \
            -scheme ChatWithEveryone \
            -configuration Release \
            -archivePath ./build/ChatWithEveryone.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/ChatWithEveryone.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Create DMG
        run: |
          mkdir -p ./build/dmg
          cp -R ./build/export/ChatWithEveryone.app ./build/dmg/
          ln -s /Applications ./build/dmg/Applications
          hdiutil create -volname "ChatWithEveryone" \
            -srcfolder ./build/dmg \
            -ov -format UDZO \
            ./build/ChatWithEveryone.dmg

      - name: Download Sparkle Tools
        run: |
          curl -sSLO https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-for-Swift-Package-Manager.zip
          unzip -o Sparkle-for-Swift-Package-Manager.zip -d sparkle-tools
          chmod +x sparkle-tools/bin/generate_appcast

      - name: Generate Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p ./updates
          cp ./build/ChatWithEveryone.dmg ./updates/
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_ed_key
          ./sparkle-tools/bin/generate_appcast \
            --ed-key-file /tmp/sparkle_ed_key \
            ./updates
          rm /tmp/sparkle_ed_key
          cat ./updates/appcast.xml

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "ChatWithEveryone ${{ github.ref_name }}" \
            --notes "请查看 [更新日志](https://raw.githubusercontent.com/horsedirty/ChatWithEveryone/main/appcast.xml)" \
            ./build/ChatWithEveryone.dmg

      - name: Update Appcast in Repository
        run: |
          cp ./updates/appcast.xml ./appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --staged --quiet || git commit -m "Update appcast for ${{ github.ref_name }}"
          git push
